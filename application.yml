cloud:
  bus:
    enabled: true

eureka:
  client:
    enabled: false

spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}  
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate: 
        ddl-auto: update
    show-sql: true
  
  data:
    redis:
      host: redis-service
      port: 6379
      password: 
      timeout: 6000ms

  rabbitmq:
    host: rabbitmq-service
    port: 5672
    username: guest
    password: guest

  